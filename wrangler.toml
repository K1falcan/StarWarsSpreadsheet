name = "star-wars-trivia"
main = "src/index.js"
compatibility_date = "2024-01-01"

# D1 SQL Database binding
[[d1_databases]]
binding = "DB"
database_name = "sw-trivia-players"
database_id = "PASTE_YOUR_D1_DATABASE_ID_HERE"

# Optional: set your admin panel password as an env var
[vars]
ADMIN_SECRET = "starwars-admin"

[build]
command = "npm install"